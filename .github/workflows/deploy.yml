name: deploy-ajbb

on:
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Debug runner
        run: |
          set -euo pipefail
          echo "Runner: $(whoami) @ $(hostname)"
          echo "Date: $(date)"
          docker --version
          docker compose version

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build image Docker
        run: |
          set -euo pipefail
          docker compose build --no-cache

      - name: Démarrer / redémarrer le container
        run: |
          set -euo pipefail
          docker compose up -d --force-recreate

      - name: Vérification santé
        run: |
          set -euo pipefail
          sleep 5
          docker compose ps
          curl -sf http://localhost:8080 > /dev/null && echo "✅ Site OK" || (echo "❌ Site KO" && docker compose logs && exit 1)

      - name: Nettoyage images obsolètes
        run: docker image prune -f
