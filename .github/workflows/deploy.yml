name: deploy-ajbb

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Debug runner
        run: |
          echo "Runner hostname: $(hostname)"
          echo "Kernel: $(uname -a)"
          echo "Whoami: $(whoami)"
          echo "Working dir: $(pwd)"
          echo "Date: $(date)"

      - name: Build & deploy on server
        run: /usr/local/bin/deploy-ajbb.sh
