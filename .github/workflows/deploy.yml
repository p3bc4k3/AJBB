name: deploy-ajbb

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Debug runner
        run: |
          echo "Runner: $(whoami) @ $(hostname)"
          echo "Kernel: $(uname -a)"
          echo "Date: $(date)"
          ls -la /var/www/ajbb/app || true

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build
        run: npm run build

      - name: Deploy build (rsync to /var/www/ajbb/app)
        run: |
          TARGET_DIR="/var/www/ajbb/app"
          BUILD_DIR="dist"
          mkdir -p "$TARGET_DIR"
          rsync -az --delete "${BUILD_DIR}/" "${TARGET_DIR}/"
          # pas de sudo ici; les droits ont été donnés en amont
