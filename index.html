<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <script>
      // Restore path encoded by 404.html for SPA routing on GitHub Pages
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alliance Judo Bassin Biterrois - AJBB</title>
    <meta name="description" content="Club de judo AJBB - Cours pour tous les âges à Villeneuve-lès-Béziers, Sauvian et Thézan-lès-Béziers" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
