version: "3.9"

services:
  ajbb-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ajbb-web
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
